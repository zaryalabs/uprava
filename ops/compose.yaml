name: uprava

services:
  opensandbox:
    image: ${UPRAVA_OPENSANDBOX_IMAGE:-opensandbox/server:v0.2.2}
    container_name: uprava-opensandbox
    restart: unless-stopped
    environment:
      SANDBOX_CONFIG_PATH: /etc/opensandbox/config.toml
      OPENSANDBOX_INSECURE_SERVER: "YES"
    ports:
      - "127.0.0.1:18083:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/uprava-workspaces:/srv/uprava-workspaces
      - ./opensandbox.toml:/etc/opensandbox/config.toml:ro
      - ./state/opensandbox:/var/lib/opensandbox
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - default

  generated-ui-builder:
    image: ${UPRAVA_GENERATED_UI_BUILDER_IMAGE:-uprava-generated-ui-builder:local}
    container_name: uprava-generated-ui-builder
    restart: unless-stopped
    read_only: true
    init: true
    cap_drop: [ALL]
    pids_limit: 64
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18082/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - generated-ui-private

  core:
    image: ${UPRAVA_CORE_IMAGE:-uprava-core:local}
    container_name: uprava-core
    restart: unless-stopped
    read_only: true
    init: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    environment:
      UPRAVA_CORE_BIND: 0.0.0.0:8080
      UPRAVA_DATABASE_URL: ${UPRAVA_DATABASE_URL:-sqlite:///data/core.sqlite}
      UPRAVA_DEPLOYMENT_PROFILE: ${UPRAVA_DEPLOYMENT_PROFILE:-controlled_dev}
      UPRAVA_ALLOWED_ORIGINS: ${UPRAVA_ALLOWED_ORIGINS:-https://uprava.zrya.io}
      UPRAVA_COOKIE_SECURE: ${UPRAVA_COOKIE_SECURE:-true}
      UPRAVA_CLIENT_LOG_FILE: ${UPRAVA_CLIENT_LOG_FILE:-/data/client.log}
      UPRAVA_CORE_LOG_FILE: ${UPRAVA_CORE_LOG_FILE:-/data/core.log}
      UPRAVA_AUTO_APPROVE_NODE_NAME: ${UPRAVA_AUTO_APPROVE_NODE_NAME:-}
      UPRAVA_GENERATED_UI_BUILDER_URL: http://generated-ui-builder:18082
      RUST_LOG: ${UPRAVA_CORE_RUST_LOG:-info}
    volumes:
      - ./${UPRAVA_CORE_STATE_DIR:-state/core}:/data
    depends_on:
      generated-ui-builder:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "uprava-server", "healthcheck", "127.0.0.1:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.docker.network=platform
      - traefik.http.middlewares.uprava-https-redirect.redirectscheme.scheme=https
      - traefik.http.routers.uprava-core.rule=Host(`${UPRAVA_DOMAIN:-uprava.zrya.io}`) && PathPrefix(`/api/v1`)
      - traefik.http.routers.uprava-core.entrypoints=websecure
      - traefik.http.routers.uprava-core.tls.certresolver=letsencrypt
      - traefik.http.routers.uprava-core.middlewares=platform-headers@file
      - traefik.http.routers.uprava-core.priority=100
      - traefik.http.routers.uprava-core.service=uprava-core
      - traefik.http.routers.uprava-core-http.rule=Host(`${UPRAVA_DOMAIN:-uprava.zrya.io}`) && PathPrefix(`/api/v1`)
      - traefik.http.routers.uprava-core-http.entrypoints=web
      - traefik.http.routers.uprava-core-http.middlewares=uprava-https-redirect@docker
      - traefik.http.routers.uprava-core-http.priority=100
      - traefik.http.routers.uprava-core-http.service=uprava-core
      - traefik.http.services.uprava-core.loadbalancer.server.port=8080
    networks:
      - platform
      - generated-ui-private

  web:
    image: ${UPRAVA_WEB_IMAGE:-uprava-web:local}
    container_name: uprava-web
    restart: unless-stopped
    read_only: true
    init: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m
      - /var/cache/nginx:rw,noexec,nosuid,nodev,size=16m
      - /var/run:rw,noexec,nosuid,nodev,size=1m
    depends_on:
      core:
        condition: service_healthy
    environment:
      UPRAVA_RELEASE_ID: ${UPRAVA_RELEASE_ID:-unknown}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.docker.network=platform
      - traefik.http.middlewares.uprava-https-redirect.redirectscheme.scheme=https
      - traefik.http.routers.uprava-web.rule=Host(`${UPRAVA_DOMAIN:-uprava.zrya.io}`)
      - traefik.http.routers.uprava-web.entrypoints=websecure
      - traefik.http.routers.uprava-web.tls.certresolver=letsencrypt
      - traefik.http.routers.uprava-web.middlewares=platform-headers@file
      - traefik.http.routers.uprava-web.priority=10
      - traefik.http.routers.uprava-web.service=uprava-web
      - traefik.http.routers.uprava-web-http.rule=Host(`${UPRAVA_DOMAIN:-uprava.zrya.io}`)
      - traefik.http.routers.uprava-web-http.entrypoints=web
      - traefik.http.routers.uprava-web-http.middlewares=uprava-https-redirect@docker
      - traefik.http.routers.uprava-web-http.priority=10
      - traefik.http.routers.uprava-web-http.service=uprava-web
      - traefik.http.services.uprava-web.loadbalancer.server.port=8080
    networks:
      - platform

networks:
  default:
  generated-ui-private:
    internal: true
  platform:
    external: true
