[server]
host = "0.0.0.0"
port = 8080
max_sandbox_timeout_seconds = 86400

[log]
level = "INFO"

[runtime]
type = "docker"
execd_image = "opensandbox/execd:v1.0.21"

[storage]
# Local development is intentionally unrestricted until API-key/profile work lands.
# OpenSandbox 0.1.12+ treats an empty list as deny-all.
allowed_host_paths = ["/"]

[store]
type = "sqlite"
path = "/var/lib/opensandbox/opensandbox.db"

[docker]
network_mode = "bridge"
host_ip = "host.docker.internal"
port_range_min = 40000
port_range_max = 60000
drop_capabilities = [
  "AUDIT_WRITE",
  "MKNOD",
  "NET_ADMIN",
  "NET_RAW",
  "SYS_ADMIN",
  "SYS_MODULE",
  "SYS_PTRACE",
  "SYS_TIME",
  "SYS_TTY_CONFIG",
]
no_new_privileges = true
pids_limit = 4096

[ingress]
mode = "direct"

[egress]
image = "opensandbox/egress:v1.1.4"
mode = "dns"
