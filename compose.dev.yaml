name: uprava-dev

services:
  opensandbox:
    image: opensandbox/server:v0.2.2
    profiles: [task-runtime]
    environment:
      SANDBOX_CONFIG_PATH: /etc/opensandbox/config.toml
      OPENSANDBOX_INSECURE_SERVER: "YES"
    ports:
      - "127.0.0.1:18083:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}:${PWD}
      - ./ops/opensandbox.dev.toml:/etc/opensandbox/config.toml:ro
      - uprava-dev-opensandbox-data:/var/lib/opensandbox
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - default

  generated-ui-builder:
    build:
      context: .
      dockerfile: Dockerfile.generated-ui-builder
    ports:
      - "127.0.0.1:18082:18082"
    read_only: true
    init: true
    cap_drop: [ALL]
    pids_limit: 64
    mem_limit: 512m
    cpus: 1.0
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    security_opt:
      - no-new-privileges:true
    networks:
      - generated-ui-private
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18082/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 5s
      timeout: 4s
      retries: 20

  toolhive:
    build:
      context: .
      dockerfile: Dockerfile.toolhive
    environment:
      RUST_LOG: info,uprava_toolhive=debug
    ports:
      - "127.0.0.1:18081:18081"
      - "127.0.0.1:18765:18765"
    volumes:
      - uprava-dev-toolhive-data:/var/lib/toolhive
      - /var/run/docker.sock:/var/run/docker.sock
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    networks:
      - toolhive-private
    healthcheck:
      test: ["CMD", "uprava-toolhive", "healthcheck"]
      interval: 5s
      timeout: 4s
      retries: 20

  core:
    build:
      context: .
      dockerfile: Dockerfile.core
    environment:
      UPRAVA_CORE_BIND: 0.0.0.0:8080
      UPRAVA_DATABASE_URL: sqlite:///data/core.sqlite
      UPRAVA_DEPLOYMENT_PROFILE: controlled_dev
      UPRAVA_ALLOWED_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      UPRAVA_GENERATED_UI_BUILDER_URL: http://generated-ui-builder:18082
      RUST_LOG: info,uprava_server=debug
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - uprava-dev-core-data:/data
    depends_on:
      generated-ui-builder:
        condition: service_healthy
    networks:
      - default
      - generated-ui-private
    healthcheck:
      test: ["CMD", "uprava-server", "healthcheck", "127.0.0.1:8080"]
      interval: 5s
      timeout: 2s
      retries: 20

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5173:8080"
    depends_on:
      core:
        condition: service_healthy

volumes:
  uprava-dev-core-data:
  uprava-dev-opensandbox-data:
  uprava-dev-toolhive-data:

networks:
  generated-ui-private:
    internal: true
  toolhive-private:
