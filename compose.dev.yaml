name: uprava-dev

services:
  core:
    build:
      context: .
      dockerfile: Dockerfile.core
    environment:
      UPRAVA_CORE_BIND: 0.0.0.0:8080
      UPRAVA_DATABASE_URL: sqlite:///data/core.sqlite
      UPRAVA_DEPLOYMENT_PROFILE: controlled_dev
      UPRAVA_ALLOWED_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      RUST_LOG: info,uprava_server=debug
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - uprava-dev-core-data:/data
    healthcheck:
      test: ["CMD", "uprava-server", "healthcheck", "127.0.0.1:8080"]
      interval: 5s
      timeout: 2s
      retries: 20

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      core:
        condition: service_healthy

volumes:
  uprava-dev-core-data:
