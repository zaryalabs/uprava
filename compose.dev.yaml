name: uprava-dev

services:
  toolhive:
    build:
      context: .
      dockerfile: Dockerfile.toolhive
    environment:
      RUST_LOG: info,uprava_toolhive=debug
    ports:
      - "127.0.0.1:18081:18081"
      - "127.0.0.1:18765:18765"
    volumes:
      - uprava-dev-toolhive-data:/var/lib/toolhive
      - /var/run/docker.sock:/var/run/docker.sock
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    networks:
      - toolhive-private
    healthcheck:
      test: ["CMD", "uprava-toolhive", "healthcheck"]
      interval: 5s
      timeout: 4s
      retries: 20

  core:
    build:
      context: .
      dockerfile: Dockerfile.core
    environment:
      UPRAVA_CORE_BIND: 0.0.0.0:8080
      UPRAVA_DATABASE_URL: sqlite:///data/core.sqlite
      UPRAVA_DEPLOYMENT_PROFILE: controlled_dev
      UPRAVA_ALLOWED_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      RUST_LOG: info,uprava_server=debug
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - uprava-dev-core-data:/data
    healthcheck:
      test: ["CMD", "uprava-server", "healthcheck", "127.0.0.1:8080"]
      interval: 5s
      timeout: 2s
      retries: 20

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5173:8080"
    depends_on:
      core:
        condition: service_healthy

volumes:
  uprava-dev-core-data:
  uprava-dev-toolhive-data:

networks:
  toolhive-private:
