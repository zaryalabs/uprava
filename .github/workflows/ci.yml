name: Uprava CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: uprava-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  prepare:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, zarya-main, geo-eu, ci]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Prepare
        env:
          CI_MAIN: ${{ github.event_name == 'push' && '1' || '0' }}
        run: ci/run.sh prepare
      - name: Cleanup
        if: always()
        run: ci/run.sh cleanup prepare

  build:
    needs: prepare
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    runs-on: [self-hosted, zarya-main, geo-eu, ci]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Build
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        run: ci/run.sh build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: uprava-release-${{ github.sha }}
          path: handoff/uprava-release.env
          if-no-files-found: error
          retention-days: 7
      - name: Cleanup
        if: always()
        run: ci/run.sh cleanup build

  deploy:
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: read
    runs-on: [self-hosted, zarya-main, geo-eu, ci]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: uprava-release-${{ github.sha }}
          path: handoff
      - name: Deploy
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        run: ci/run.sh deploy
      - name: Cleanup
        if: always()
        run: ci/run.sh cleanup deploy

  finalize:
    needs: deploy
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: read
    runs-on: [self-hosted, zarya-main, geo-eu, ci]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: uprava-release-${{ github.sha }}
          path: handoff
      - name: Finalize
        run: ci/run.sh finalize
      - name: Cleanup
        if: always()
        run: ci/run.sh cleanup finalize
