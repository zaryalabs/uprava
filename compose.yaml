name: uprava

services:
  core:
    build:
      context: .
      dockerfile: Dockerfile.core
    environment:
      UPRAVA_CORE_BIND: 0.0.0.0:8080
      UPRAVA_DATABASE_URL: sqlite:///data/core.sqlite
      UPRAVA_DEPLOYMENT_PROFILE: controlled_dev
      UPRAVA_ALLOWED_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      RUST_LOG: info,uprava_server=debug
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - uprava-core-data:/data
    healthcheck:
      test: ["CMD", "uprava-server", "healthcheck", "127.0.0.1:8080"]
      interval: 5s
      timeout: 2s
      retries: 20

  node:
    build:
      context: .
      dockerfile: Dockerfile.node
    environment:
      UPRAVA_CORE_URL: http://core:8080
      UPRAVA_NODE_DISPLAY_NAME: Compose Node
      UPRAVA_NODE_STATE_PATH: /state/node.json
      UPRAVA_NODE_WORKSPACES: /workspace
      RUST_LOG: info,uprava_node=debug
    volumes:
      - uprava-node-state:/state
      - ./docs:/workspace:ro
    depends_on:
      core:
        condition: service_healthy

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      core:
        condition: service_healthy

volumes:
  uprava-core-data:
  uprava-node-state:
