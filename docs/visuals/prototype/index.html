<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Static UI/UX prototype of the Uprava control panel"
    />
    <title>Uprava — UI prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to Main Content</a>

    <div class="app-shell">
      <header class="topbar">
        <div class="brand-area">
          <button
            class="icon-button sidebar-toggle"
            id="toggle-sidebar"
            type="button"
            data-action="toggle-sidebar"
            aria-label="Hide navigation"
            aria-controls="sidebar"
            aria-expanded="true"
          >
            <span aria-hidden="true">☰</span>
          </button>
          <a class="brand" href="#dashboard" data-route="dashboard">
            <span class="brand-mark" aria-hidden="true">У</span>
            <strong>Uprava</strong>
          </a>
        </div>

        <div class="topbar-context">
          <span>Control Plane</span>
          <span class="context-divider" aria-hidden="true">/</span>
          <span id="topbar-location">Dashboard</span>
        </div>

        <div class="topbar-actions">
          <span class="environment-chip">controlled_dev</span>
          <span class="connection-state">
            <i class="status-dot online" aria-hidden="true"></i>
            API Connected
          </span>
          <button class="icon-button" type="button" data-route="settings">
            <span aria-hidden="true">⚙</span>
            <span class="sr-only">Settings</span>
          </button>
        </div>
      </header>

      <div id="shell-grid" class="shell-grid">
        <aside
          class="sidebar"
          id="sidebar"
          aria-label="Node and workspace navigation"
        >
          <nav class="global-nav" aria-label="Global navigation">
            <a href="#dashboard" data-route="dashboard">
              <span aria-hidden="true">⌘</span>
              Dashboard
            </a>
          </nav>

          <section class="node-navigation" aria-labelledby="nodes-heading">
            <div class="sidebar-heading">
              <span id="nodes-heading">Nodes</span>
              <button class="bare-button" type="button" data-action="add-node">
                <span aria-hidden="true">＋</span>
                <span class="sr-only">Add Node</span>
              </button>
            </div>

            <div class="node-group expanded">
              <a
                class="node-link"
                href="#node"
                data-route="node"
                data-nav-context="local-node"
              >
                <span class="tree-disclosure" aria-hidden="true">⌄</span>
                <span class="node-icon" aria-hidden="true">▣</span>
                <span class="nav-label">Local Node</span>
                <span class="presence-dot stale" title="stale"></span>
              </a>

              <div class="workspace-list">
                <a
                  class="workspace-link"
                  href="#agent"
                  data-route="agent"
                  data-nav-context="uprava"
                >
                  <span aria-hidden="true">◇</span>
                  <span class="nav-label">Uprava</span>
                  <span class="workspace-mark dirty" title="dirty"></span>
                </a>
                <button
                  class="workspace-link muted-row"
                  type="button"
                  data-action="prototype-only"
                >
                  <span aria-hidden="true">◇</span>
                  <span class="nav-label">Research Lab</span>
                </button>
              </div>
            </div>

            <div class="node-group">
              <a
                class="node-link"
                href="#node-zarya"
                data-route="node-zarya"
                data-nav-context="zarya-node"
              >
                <span class="tree-disclosure" aria-hidden="true">›</span>
                <span class="node-icon" aria-hidden="true">▣</span>
                <span class="nav-label">Zarya Server</span>
                <span class="presence-dot online" title="online"></span>
              </a>
            </div>
          </section>

          <div class="sidebar-foot">
            <span class="caption">2 nodes · 3 workspaces</span>
          </div>
        </aside>

        <main id="main-content" tabindex="-1"></main>

        <aside class="inspector" aria-label="Context Inspector">
          <header class="inspector-head">
            <div>
              <div class="eyebrow">Context Inspector</div>
              <div class="caption">Source · Evidence · Cause</div>
            </div>
            <button
              class="icon-button"
              id="close-inspector"
              type="button"
              aria-label="Close Inspector"
            >
              ×
            </button>
          </header>
          <div id="inspector-content"></div>
        </aside>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
  </body>
</html>
